openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dsa
    description: DSA problem analysis and visualization
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dsa/analyze:
    post:
      operationId: analyzeProblem
      tags: [dsa]
      summary: Analyze a DSA problem
      description: Uses AI to analyze a DSA problem and generate visualization steps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeProblemBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dsa/history:
    get:
      operationId: getAnalysisHistory
      tags: [dsa]
      summary: Get recent analysis history
      description: Returns a list of recent DSA problem analyses
      responses:
        "200":
          description: List of recent analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisHistoryItem"

  /dsa/history/{id}:
    get:
      operationId: getAnalysisById
      tags: [dsa]
      summary: Get a specific analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteAnalysis
      tags: [dsa]
      summary: Delete an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dsa/patterns:
    get:
      operationId: getPatternStats
      tags: [dsa]
      summary: Get pattern usage statistics
      description: Returns counts of analyzed problems grouped by pattern
      responses:
        "200":
          description: Pattern statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatternStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AnalyzeProblemBody:
      type: object
      properties:
        problem:
          type: string
        customInput:
          type: ["string", "null"]
      required:
        - problem

    VisualizationStep:
      type: object
      properties:
        state:
          type: object
          additionalProperties: true
        highlight:
          type: array
          items:
            type: ["integer", "null"]
        description:
          type: string
        type:
          type: string
      required:
        - state
        - highlight
        - description
        - type

    CodeSnippets:
      type: object
      properties:
        cpp:
          type: string
        java:
          type: string
      required:
        - cpp
        - java

    AnalysisResult:
      type: object
      properties:
        id:
          type: integer
        problem:
          type: string
        pattern:
          type: string
        difficulty:
          type: string
        brute_force:
          type: string
        optimal:
          type: string
        code:
          $ref: "#/components/schemas/CodeSnippets"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/VisualizationStep"
        createdAt:
          type: string
      required:
        - id
        - problem
        - pattern
        - difficulty
        - brute_force
        - optimal
        - code
        - steps
        - createdAt

    AnalysisHistoryItem:
      type: object
      properties:
        id:
          type: integer
        problem:
          type: string
        pattern:
          type: string
        difficulty:
          type: string
        createdAt:
          type: string
      required:
        - id
        - problem
        - pattern
        - difficulty
        - createdAt

    PatternStat:
      type: object
      properties:
        pattern:
          type: string
        count:
          type: integer
      required:
        - pattern
        - count
